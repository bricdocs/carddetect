<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kararlı Kart Algılayıcı</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #144319; /* Briç masası yeşili */
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3; 
        }
        video, canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #canvasOutput { z-index: 2; }
        .counter-box {
            margin-top: 15px;
            font-size: 1.2rem;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }
        #cardCount { color: #00ff00; font-size: 1.8rem; font-weight: bold; }
        .hand-list {
            margin-top: 12px;
            background: #333;
            padding: 10px;
            border-radius: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>♠️ ♥️ Donanımsal Kart Dedektörü ♦️ ♣️</h1>
    <p id="status" style="color: #ffcc00;">Sistem Başlatılıyor...</p>

    <div class="video-container">
        <video id="videoInput" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="counter-box">
        Algılanan Kart Sayısı: <span id="cardCount">0</span>
    </div>

    <div class="hand-list">
        <strong>Mevcut El:</strong> <br>
        <span id="detectedHand" style="color: #00ff00;">Kart Okutulması Bekleniyor...</span>
    </div>
</div>

<script>
const video = document.getElementById('videoInput');
const canvas = document.getElementById('canvasOutput');
const ctx = canvas.getContext('2d');
let barcodeDetector;
let detectedCardsMap = new Map(); // Kartları ve son görülme zamanlarını tutar

window.onload = function() {
    // Tarayıcının yerleşik barkod/QR okuma motoru var mı kontrol et
    if ('BarcodeDetector' in window) {
        barcodeDetector = new BarcodeDetector({ formats: ['qr_code', 'code_128', 'ean_13'] });
        startCamera();
    } else {
        document.getElementById('status').innerText = "Hata: Tarayıcınız donanımsal yapay zekayı desteklemiyor. Lütfen Chrome veya Safari'yi güncelleyin.";
        document.getElementById('status').style.color = "#ff4444";
    }
};

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            video.onloadedmetadata = function() {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('status').innerText = "Sistem Aktif: Kart Kodlarını Taratın";
                document.getElementById('status').style.color = "#00ff00";
                tick();
            };
        })
        .catch(function(err) {
            document.getElementById('status').innerText = "Kamera erişim izni reddedildi.";
        });
}

function tick() {
    if (video.paused || video.ended) return;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Telefonun kendi işlemcisini kullanarak görüntüyü tara (Sıfır kasma)
    barcodeDetector.detect(canvas)
        .then(barcodes => {
            const now = Date.now();

            barcodes.forEach(barcode => {
                // Okunan QR/Barkod değerini el listesine ekle (Örn: "Kupa As", "Sinek 10")
                detectedCardsMap.set(barcode.rawValue, now);

                // Ekranda kartın üzerine yeşil çerçeve çiz
                const bounding = barcode.boundingBox;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 4;
                ctx.strokeRect(bounding.x, bounding.y, bounding.width, bounding.height);
                
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(barcode.rawValue, bounding.x, bounding.y - 10);
            });

            // 3 saniye boyunca kamerada görünmeyen kartları listeden temizle (Dinamik güncelleme)
            for (let [card, lastSeen] of detectedCardsMap.entries()) {
                if (now - lastSeen > 3000) {
                    detectedCardsMap.delete(card);
                }
            }

            // Arayüzü güncelle
            document.getElementById('cardCount').innerText = detectedCardsMap.size;
            if (detectedCardsMap.size > 0) {
                document.getElementById('detectedHand').innerHTML = Array.from(detectedCardsMap.keys()).join('<br>');
            } else {
                document.getElementById('detectedHand').innerText = "Kart Okutulması Bekleniyor...";
            }
        })
        .catch(err => {
            console.error("Tarama hatası:", err);
        });

    requestAnimationFrame(tick);
}
</script>
</body>
</html>
