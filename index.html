<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briç Kart Barkod Tarayıcı</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #144319; /* Briç masası yeşili */
            color: white;
            text-align: center;
            margin: 0; padding: 10px;
        }
        .container {
            width: 100%; max-width: 500px; margin: auto;
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 12px;
            box-sizing: border-box;
        }
        .video-container {
            position: relative; width: 100%; background: #000;
            border-radius: 8px; overflow: hidden; aspect-ratio: 4 / 3; 
        }
        video, canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        #canvasOutput { z-index: 2; }
        .controls { margin-top: 10px; display: flex; gap: 10px; justify-content: center; }
        button {
            background: #007bff; color: white; border: none; padding: 10px 15px;
            border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        .session-box {
            margin-top: 15px; background: #222; padding: 12px; border-radius: 8px; text-align: left;
        }
        .session-box h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: #ffcc00; display: flex; justify-content: space-between;}
        #savedList {
            max-height: 150px; overflow-y: auto; padding: 0; margin: 0; list-style: none;
        }
        #savedList li {
            padding: 6px; background: #333; margin-bottom: 4px; border-radius: 4px;
            display: flex; justify-content: space-between; font-family: monospace; font-size: 1rem;
        }
        .delete-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 0 5px; }
        #status { color: #00ff00; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🃏 Briç Barkod Tarayıcı</h2>
    <p id="status">Kamera Hazırlanıyor...</p>

    <div class="video-container">
        <video id="videoInput" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="controls">
        <button id="switchCamBtn">Kamerayı Değiştir (Arka/Ön)</button>
    </div>

    <div class="session-box">
        <h3>
            <span>💾 Kaydedilen Kartlar (<span id="cardCount">0</span>)</span>
            <span id="lastScanned" style="font-size:0.9rem; color:#00ff00;"></span>
        </h3>
        <ul id="savedList">
            <!-- Kaydedilen kart kodları buraya eklenecek -->
        </ul>
        <div class="controls" style="margin-top:10px;">
            <button class="success" id="shareBtn">Listeyi Paylaş / Yayınla</button>
            <button class="danger" id="clearBtn">Listeyi Sıfırla</button>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('videoInput');
const canvas = document.getElementById('canvasOutput');
const ctx = canvas.getContext('2d');

let barcodeDetector;
let currentStream = null;
let currentFacingMode = "user"; // "user" = Ön Kamera, "environment" = Arka Kamera
let savedCards = JSON.parse(localStorage.getItem('bric_cards')) || []; // Hafızadan eski kartları yükle
let lastScannedCode = "";
let lastScannedTime = 0;

window.onload = function() {
    // Tarayıcının yerleşik barkod okuma altyapısı var mı kontrol et
    if ('BarcodeDetector' in window) {
        // Kartlarda sık kullanılan tüm standart barkod türlerini destekle
        barcodeDetector = new BarcodeDetector({ formats: ['code_128', 'code_39', 'qr_code', 'ean_13', 'ean_8'] });
        updateUI();
        startCamera();
    } else {
        document.getElementById('status').innerText = "Hata: Tarayıcı barkod motorunu desteklemiyor. Güncel Chrome/Safari kullanın.";
        document.getElementById('status').style.color = "#ff4444";
    }

    // Buton Dinleyicileri
    document.getElementById('switchCamBtn').onclick = switchCamera;
    document.getElementById('clearBtn').onclick = clearList;
    document.getElementById('shareBtn').onclick = shareList;
};

function startCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const constraints = {
        video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            currentStream = stream;
            video.srcObject = stream;
            video.play();
            video.onloadedmetadata = function() {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('status').innerText = `Sistem Aktif (${currentFacingMode === 'user' ? 'Ön Kamera' : 'Arka Kamera'})`;
                tick();
            };
        })
        .catch(function(err) {
            document.getElementById('status').innerText = "Kamera erişim hatası!";
            document.getElementById('status').style.color = "#ff4444";
        });
}

function switchCamera() {
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    startCamera();
}

function tick() {
    if (video.paused || video.ended) return;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Kılavuz Tarama Vizörü Çiz (Kartı buraya hizalayın)
    ctx.strokeStyle = "#ffcc00";
    ctx.lineWidth = 3;
    ctx.strokeRect(canvas.width * 0.15, canvas.height * 0.3, canvas.width * 0.7, canvas.height * 0.4);

    barcodeDetector.detect(canvas)
        .then(barcodes => {
            const now = Date.now();
            barcodes.forEach(barcode => {
                let codeValue = barcode.rawValue.trim().toUpperCase();

                // Çift okumayı engelleme: Aynı kart 2 saniye içinde tekrar kaydedilmez
                if (codeValue !== lastScannedCode || (now - lastScannedTime > 2000)) {
                    
                    // Eğer listede bu kart zaten yoksa kaydet
                    if (!savedCards.includes(codeValue)) {
                        savedCards.push(codeValue);
                        localStorage.setItem('bric_cards', JSON.stringify(savedCards));
                        updateUI();
                        
                        // Son taranan bildirimi
                        document.getElementById('lastScanned').innerText = `Son: ${codeValue} ✅`;
                        setTimeout(() => { document.getElementById('lastScanned').innerText = ""; }, 2000);
                    }

                    lastScannedCode = codeValue;
                    lastScannedTime = now;
                }

                // Ekranda barkodun etrafına yeşil kutu çiz
                const b = barcode.boundingBox;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 4;
                ctx.strokeRect(b.x, b.y, b.width, b.height);
            });
        })
        .catch(err => console.error("Barkod tarama hatası:", err));

    requestAnimationFrame(tick);
}

function updateUI() {
    const listElement = document.getElementById('savedList');
    listElement.innerHTML = "";
    
    savedCards.forEach((card, index) => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${index + 1}. ${card}</span> <span class="delete-btn" onclick="deleteCard(${index})">❌</span>`;
        listElement.appendChild(li);
    });

    document.getElementById('cardCount').innerText = savedCards.length;
}

function deleteCard(index) {
    savedCards.splice(index, 1);
    localStorage.setItem('bric_cards', JSON.stringify(savedCards));
    updateUI();
}

function clearList() {
    if (confirm("Tüm listeyi silmek istediğinize emin misiniz?")) {
        savedCards = [];
        localStorage.removeItem('bric_cards');
        updateUI();
        lastScannedCode = "";
    }
}

function shareList() {
    if (savedCards.length === 0) {
        alert("Paylaşılacak kart yok!");
        return;
    }
    
    const textToShare = "Briç El Listesi:\n" + savedCards.join("\n");

    // Telefonun kendi paylaşma menüsünü tetikle (WhatsApp, SMS, Notlar vb.)
    if (navigator.share) {
        navigator.share({
            title: 'Briç Kartları',
            text: textToShare
        }).catch(err => console.log(err));
    } else {
        // Eğer tarayıcı desteklemiyorsa panoya kopyala
        navigator.clipboard.writeText(textToShare);
        alert("Paylaşım desteklenmiyor, liste kopyalandı:\n\n" + textToShare);
    }
}
</script>
</body>
</html>
