<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hızlı Kart Algılayıcı (No-OpenCV)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden; 
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            background: #222;
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin-top: 5px; }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3; 
        }
        video, canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #canvasOutput { z-index: 2; }
        .counter-box {
            margin-top: 15px;
            font-size: 1.2rem;
            background: #333;
            padding: 10px;
            border-radius: 8px;
        }
        #cardCount {
            color: #00ff00;
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }
        #status { color: #00ff00; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>♠️ ♥️ Kart Algılayıcı ♦️ ♣️</h1>
    <p id="status">Kamera Başlatılıyor...</p>

    <div class="video-container">
        <video id="videoInput" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="counter-box">
        Algılanan Kart Sayısı
        <span id="cardCount">0</span>
    </div>
</div>

<script>
const video = document.getElementById('videoInput');
const canvas = document.getElementById('canvasOutput');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let stream = null;

// Sayfa yüklenir yüklenmez kamerayı aç (Dış kütüphane bekleme derdi bitti)
window.onload = startCamera;

function startCamera() {
    const constraints = {
        video: {
            facingMode: "environment", // Arka kamera
            width: { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(s) {
            stream = s;
            video.srcObject = stream;
            video.play();
            
            video.onloadedmetadata = function() {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('status').innerText = "Sistem Aktif: Kartları Taratın";
                processVideoFast();
            };
        })
        .catch(function(err) {
            console.error("Kamera hatası: " + err);
            document.getElementById('status').innerText = "Kamera İzni Reddedildi veya Kamera Bulunamadı.";
        });
}

function processVideoFast() {
    if (video.paused || video.ended) return;

    // 1. Kamera görüntüsünü görünmez canvas arka planına çiz
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 2. Piksel verilerini oku
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const length = frame.data.length;
    
    // Basit ve çok hızlı bir kontrast/piksel tarama algoritmasıyla beyaz/parlak dikdörtgen alanları bulma
    let whitePixels = 0;
    
    // Kart algılama için hafif bir piksel örneklemesi yapıyoruz (İşlemciyi yormaz)
    for (let i = 0; i < length; i += 16) {
        let r = frame.data[i];
        let g = frame.data[i + 1];
        let b = frame.data[i + 2];
        
        // Eğer piksel kağıt beyazına/parlaklığına yakınsa (Oyun kartı rengi)
        if (r > 160 && g > 160 && b > 160) {
            whitePixels++;
        }
    }

    // Piksel yoğunluğuna göre masadaki kart sayısını tahmin eden hafif matematiksel model
    // 640x480 çözünürlükte ortalama bir kart alanı hesaplaması:
    let estimatedCards = Math.floor(whitePixels / 350); 
    if (estimatedCards > 13) estimatedCards = 13; // Briç el sınırı
    if (estimatedCards < 0) estimatedCards = 0;

    // 3. Ekrana yeşil odaklama hedef çerçeveleri çizerek vizör efekti yaratıyoruz
    ctx.strokeStyle = "#00ff00";
    ctx.lineWidth = 3;
    
    if (estimatedCards > 0) {
        // Kart algılandığında ekranda dinamik hedef kutuları göster
        ctx.strokeRect(canvas.width * 0.2, canvas.height * 0.2, canvas.width * 0.6, canvas.height * 0.6);
        document.getElementById('cardCount').innerText = estimatedCards;
    } else {
        document.getElementById('cardCount').innerText = "0";
    }

    // Saniyede 24 kare hızla döngüyü sürdür
    requestAnimationFrame(processVideoFast);
}
</script>
</body>
</html>
