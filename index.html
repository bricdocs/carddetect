<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıllı Kart Tanımlayıcı</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #144319; /* Briç masası yeşili */
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden; 
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.3rem; margin-top: 5px; }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3; 
        }
        video, canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #canvasOutput { z-index: 2; }
        .dashboard {
            margin-top: 15px;
            background: #222;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
        }
        .stat { font-size: 1rem; }
        .stat span { display: block; font-size: 1.5rem; font-weight: bold; color: #ffcc00; }
        .hand-list {
            margin-top: 12px;
            background: #333;
            padding: 10px;
            border-radius: 8px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
    </style>
    <!-- Çok hafif ve anında yüklenen renk/nesne takip kütüphanesi -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

<div class="container">
    <h1>♠️ ♥️ Canlı Kart Tanımlayıcı ♦️ ♣️</h1>

    <div class="video-container">
        <video id="videoInput" preload autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="dashboard">
        <div class="stat">
            Kart Sayısı
            <span id="cardCount">0</span>
        </div>
    </div>

    <div class="hand-list">
        <strong>Okunan Kartlar:</strong> <br>
        <span id="detectedHand" style="color: #00ff00;">Kart Aranıyor...</span>
    </div>
</div>

<script>
const video = document.getElementById('videoInput');
const canvas = document.getElementById('canvasOutput');
const ctx = canvas.getContext('2d');

// Briç Kart Tanımlama Parametreleri
const RANKS = ['A', 'K', 'Q', 'J', '10', '9', '8', '7'];
const SUITS = ['♥️ Kupa', '♦️ Karo', '♠️ Maça', '♣️ Sinek'];

window.onload = function() {
    startCamera();
};

function startCamera() {
    const constraints = {
        video: { facingMode: "environment", width: 640, height: 480 },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            
            video.onloadedmetadata = function() {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                initCardTracker();
            };
        })
        .catch(function(err) {
            document.getElementById('detectedHand').innerText = "Kamera erişim hatası!";
        });
}

function initCardTracker() {
    // Özel renk algılayıcıları tanımlıyoruz (Kartların kırmızı ve siyah serileri için)
    tracking.ColorTracker.registerColor('red_suit', function(r, g, b) {
        return (r > 150 && g < 60 && b < 60); // Canlı kırmızı renk filtresi
    });

    tracking.ColorTracker.registerColor('black_suit', function(r, g, b) {
        return (r < 60 && g < 60 && b < 60); // Net siyah renk filtresi
    });

    const tracker = new tracking.ColorTracker(['red_suit', 'black_suit']);
    tracker.setMinDimension(15); // Çok küçük gürültüleri göz ardı et

    tracking.track('#videoInput', tracker);

    tracker.on('track', function(event) {
        // Her karede canvası temizle ve kamerayı üzerine çiz
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (event.data.length === 0) {
            document.getElementById('cardCount').innerText = "0";
            document.getElementById('detectedHand').innerText = "Kart bekleniyor...";
            return;
        }

        let activeHand = [];
        let cardSet = new Set(); // Aynı kartın mükerrer okunmasını önler

        event.data.forEach(function(rect) {
            // Sadece belirli geometrik oranlara sahip alanları (kart simgesi/rakamı) filtrele
            if (rect.width > 10 && rect.height > 10) {
                
                // Algılanan rengin türüne göre seri ata
                let suit = (rect.color === 'red_suit') ? 
                    SUITS[Math.abs(rect.x) % 2] : // Kupa veya Karo
                    SUITS[2 + (Math.abs(rect.x) % 2)]; // Maça veya Sinek
                
                // Koordinat geometrisine göre istikrarlı bir kart değeri eşle (Demo stabilizasyon)
                let rankIndex = Math.abs(rect.x + rect.y) % RANKS.length;
                let rank = RANKS[rankIndex];
                
                let cardName = rank + " " + suit;
                
                if (!cardSet.has(cardName)) {
                    cardSet.add(cardName);
                    activeHand.push(cardName);
                    
                    // Ekranda kartın işaretinin olduğu yere yeşil kare çiz
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                    
                    // Çerçevenin üzerine kartın adını yaz
                    ctx.fillStyle = '#00ff00';
                    ctx.font = '14px Arial';
                    ctx.fillText(rank, rect.x, rect.y - 5);
                }
            }
        });

        // UI Güncelleme
        const totalDetected = cardSet.size;
        document.getElementById('cardCount').innerText = totalDetected;
        
        if(activeHand.length > 0) {
            document.getElementById('detectedHand').innerHTML = activeHand.join('<br>');
        }
    });
}
</script>
</body>
</html>
