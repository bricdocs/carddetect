<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hızlı Kart Algılayıcı</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden; 
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            background: #222;
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin-top: 5px; }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3; 
        }
        video, canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #canvasOutput { z-index: 2; }
        .counter-box {
            margin-top: 15px;
            font-size: 1.2rem;
            background: #333;
            padding: 10px;
            border-radius: 8px;
        }
        #cardCount {
            color: #00ff00;
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }
        #status { color: #ffcc00; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
    
    <!-- ÇÖZÜM: Çok daha hızlı ve kararlı çalışan cdnjs OpenCV.js kütüphanesi -->
    <script src="https://cloudflare.com" type="text/javascript"></script>
</head>
<body>

<div class="container">
    <h1>♠️ ♥️ Kart Algılayıcı ♦️ ♣️</h1>
    <p id="status">OpenCV.js Modülü Başlatılıyor...</p>

    <div class="video-container">
        <video id="videoInput" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="counter-box">
        Algılanan Kart Sayısı
        <span id="cardCount">0</span>
    </div>
</div>

<script>
let video = document.getElementById('videoInput');
let canvasOutput = document.getElementById('canvasOutput');
let stream = null;

// OpenCV kütüphanesinin hazır olup olmadığını kontrol eden güvenli mekanizma
function checkOpenCV() {
    if (typeof cv !== 'undefined' && cv.Mat) {
        document.getElementById('status').innerText = "Kamera Başlatılıyor...";
        startCamera();
    } else {
        // Hazır değilse yarım saniye sonra tekrar dene
        setTimeout(checkOpenCV, 500);
    }
}

// Sayfa yüklenir yüklenmez kontrolü başlat
window.onload = checkOpenCV;

function startCamera() {
    const constraints = {
        video: {
            facingMode: "environment", // Arka kamerayı hedefler
            width: { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(s) {
            stream = s;
            video.srcObject = stream;
            video.play();
            
            video.onloadedmetadata = function() {
                canvasOutput.width = video.videoWidth;
                canvasOutput.height = video.videoHeight;
                document.getElementById('status').innerText = "Sistem Aktif: Kartları Taratın";
                processVideo();
            };
        })
        .catch(function(err) {
            console.error("Kamera hatası: " + err);
            document.getElementById('status').innerText = "Kamera İzni Reddedildi veya Kamera Bulunamadı.";
        });
}

function processVideo() {
    if (!video.srcObject) return;

    let width = video.videoWidth || 640;
    let height = video.videoHeight || 480;

    let src = new cv.Mat(height, width, cv.CV_8UC4);
    let dst = new cv.Mat(height, width, cv.CV_8UC4);
    let gray = new cv.Mat();
    let blurred = new cv.Mat();
    let thresh = new cv.Mat();
    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    
    let cap = new cv.VideoCapture(video);
    const FPS = 24; 

    function processFrame() {
        try {
            if (video.paused || video.ended) return;
            
            cap.read(src);
            src.copyTo(dst);
            
            // Hassas ve Dinamik İşleme Modu
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
            
            // Işıktan etkilenmeyen dinamik eşikleme
            cv.adaptiveThreshold(blurred, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
            
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            
            let detectedCount = 0;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);
                let approx = new cv.Mat();
                cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);
                
                // Dikdörtgen ve kart boyutu filtreleri
                if (approx.rows === 4 && area > 1500 && area < 90000) {
                    detectedCount++;
                    
                    let rect = cv.boundingRect(cnt);
                    let point1 = new cv.Point(rect.x, rect.y);
                    let point2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                    cv.rectangle(dst, point1, point2, new cv.Scalar(0, 255, 0, 255), 4);
                }
                approx.delete();
            }

            cv.imshow('canvasOutput', dst);
            document.getElementById('cardCount').innerText = detectedCount;

            setTimeout(processFrame, 1000 / FPS);
        } catch (err) {
            console.error(err);
        }
    };

    setTimeout(processFrame, 0);
}
</script>
</body>
</html>
